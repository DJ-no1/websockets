<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Sharing Application</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      color-scheme: light;
      --page: oklch(0.975 0.008 238);
      --panel: oklch(0.995 0.006 238);
      --ink: oklch(0.22 0.025 238);
      --muted: oklch(0.48 0.025 238);
      --line: oklch(0.88 0.014 238);
      --accent: oklch(0.58 0.17 248);
      --accent-strong: oklch(0.47 0.18 248);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .app-topbar {
      position: fixed;
      z-index: 500;
      top: 16px;
      left: 16px;
      right: 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .app-ready .app-topbar {
      display: flex;
    }

    .profile-chip,
    .logout-button,
    .login-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px oklch(0.2 0.025 238 / 0.16);
    }

    .profile-chip {
      min-width: 0;
      max-width: min(420px, calc(100vw - 116px));
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px 8px 8px;
      border-radius: 999px;
      pointer-events: auto;
    }

    .profile-chip-name,
    .profile-chip-email {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-chip-name {
      font-size: 14px;
      font-weight: 700;
    }

    .profile-chip-email {
      color: var(--muted);
      font-size: 12px;
    }

    .logout-button,
    .login-button {
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    .logout-button {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      color: var(--ink);
      pointer-events: auto;
    }

    .login-shell {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(
          135deg,
          oklch(0.97 0.018 248 / 0.9),
          oklch(0.94 0.025 178 / 0.82)
        ),
        var(--page);
    }

    .app-ready .login-shell {
      display: none;
    }

    .login-panel {
      width: min(420px, 100%);
      border-radius: 8px;
      padding: 28px;
    }

    .login-panel h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .login-panel p {
      margin: 12px 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .login-button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      color: oklch(0.98 0.006 248);
      background: var(--accent);
    }

    .login-button:hover {
      background: var(--accent-strong);
    }

    .auth-status {
      min-height: 18px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .profile-marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid oklch(0.98 0.006 248);
      box-shadow: 0 1px 6px oklch(0.2 0.025 238 / 0.35);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: oklch(0.98 0.006 248);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .leaflet-div-icon.profile-div-icon {
      background: transparent;
      border: none;
      padding: 0;
    }

    @media (max-width: 560px) {
      .app-topbar {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      .profile-chip {
        max-width: calc(100vw - 78px);
      }

      .login-panel {
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="login-shell" id="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <h1 id="login-title">Sign in to share location</h1>
      <p>Your live map, profile marker, and nearby people stay hidden until OIDC confirms your session.</p>
      <button class="login-button" id="login-button" type="button">Continue with OIDC</button>
      <div class="auth-status" id="auth-status">Checking your session...</div>
    </section>
  </div>

  <header class="app-topbar" aria-label="Signed in profile">
    <div class="profile-chip">
      <span id="profile-avatar"></span>
      <span>
        <span class="profile-chip-name" id="profile-name"></span>
        <span class="profile-chip-email" id="profile-email"></span>
      </span>
    </div>
    <form method="post" action="/auth/logout">
      <button class="logout-button" type="submit" title="Log out" aria-label="Log out">⎋</button>
    </form>
  </header>

  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    let socket = null;
    const map = L.map('map').setView([20.5937, 78.9629], 5);

    const remoteMarkers = new Map();
    let currentUser = null;
    let myCurrentLocationMarker = null;

    const loginButton = document.getElementById('login-button');
    const authStatus = document.getElementById('auth-status');
    const profileAvatar = document.getElementById('profile-avatar');
    const profileName = document.getElementById('profile-name');
    const profileEmail = document.getElementById('profile-email');

    loginButton.addEventListener('click', () => {
      window.location.href = '/auth/login';
    });

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getInitial(nameOrEmail) {
      const text = String(nameOrEmail || '?').trim();
      return (text[0] || '?').toUpperCase();
    }

    function createProfileIcon({ name, size = 40 }) {
      const label = escapeHtml(name || 'Profile');
      const initial = escapeHtml(getInitial(name));
      const html = `<div class="profile-marker" role="img" aria-label="${label}" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.42)}px"><span aria-hidden="true">${initial}</span></div>`;

      return L.divIcon({
        className: 'profile-div-icon',
        html,
        iconSize: [size, size],
        iconAnchor: [Math.round(size / 2), size],
        popupAnchor: [0, -Math.round(size / 2) - 12],
      });
    }

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution:
        '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);

    function getUsersCurrentLocation() {
      return new Promise((res, rej) => {
        if ('geolocation' in navigator) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const latitude = position.coords.latitude;
              const longitude = position.coords.longitude;
              res({ latitude, longitude });
            },
            (err) => {
              rej(err);
            },
            { enableHighAccuracy: true },
          );
        } else {
          rej(new Error('Geolocation is not available in this browser'));
        }
      });
    }

    function renderProfile(user) {
      const displayName = user.name || user.email || 'Signed in user';
      profileAvatar.innerHTML = createProfileIcon({
        name: displayName,
        size: 36,
      }).options.html;
      profileName.textContent = displayName;
      profileEmail.textContent = user.email || '';
    }

    async function sendMyLocation() {
      try {
        const { latitude, longitude } = await getUsersCurrentLocation();
        socket.emit('client:location:update', { latitude, longitude });

        const icon = createProfileIcon({
          name: currentUser.name || currentUser.email,
          size: 48,
        });

        if (!myCurrentLocationMarker) {
          myCurrentLocationMarker = L.marker([latitude, longitude], { icon })
            .addTo(map)
            .bindPopup('You are here');
        } else {
          myCurrentLocationMarker.setLatLng([latitude, longitude]);
          myCurrentLocationMarker.setIcon(icon);
        }
      } catch (error) {
        authStatus.textContent = error.message || 'Could not read your location.';
      }
    }

    function watchLocations() {
      sendMyLocation();
      setInterval(sendMyLocation, 10 * 1000);
    }

    function connectSocket() {
      socket = io();

      socket.on('connect_error', (error) => {
        authStatus.textContent = error.message || 'Could not connect to live location.';
      });

      socket.on('server:location:update', (data) => {
        const { id, latitude, longitude, name } = data;
        if (currentUser?.subject && id === currentUser.subject) return;

        const displayName = name || id;
        const icon = createProfileIcon({
          name: displayName,
        });

        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude], { icon })
            .addTo(map)
            .bindPopup(escapeHtml(displayName));
          remoteMarkers.set(id, marker);
        } else {
          const existingMarker = remoteMarkers.get(id);
          existingMarker.setLatLng([latitude, longitude]);
          existingMarker.setIcon(icon);
        }
      });
    }

    async function main() {
      try {
        const response = await fetch('/auth/me', {
          credentials: 'same-origin',
        });
        const session = await response.json();

        if (!session.authenticated || !session.user) {
          authStatus.textContent = 'Sign in to unlock your map.';
          return;
        }

        currentUser = session.user;
        renderProfile(currentUser);
        document.body.classList.add('app-ready');
        connectSocket();
        watchLocations();
      } catch (error) {
        authStatus.textContent = 'Could not check your session. Try signing in again.';
        console.error(error);
      }
    }

    window.addEventListener('load', main);
  </script>
</body>

</html>
