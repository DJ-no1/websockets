<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-size: 13px; /* small text */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #app {
      width: 100%;
      height: 100vh;
      max-width: 480px;
      max-height: 80vh;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    header {
      padding: 14px 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 500;
      color: #888;
      text-transform: lowercase; /* small letters */
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #status {
      font-size: 10px;
      color: #ef4444;
    }
    #status.connected {
      color: #22c55e;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      align-self: flex-start;
    }
    .msg-wrapper.self {
      align-self: flex-end;
      align-items: flex-end;
    }
    .sender {
      font-size: 10px;
      color: #555;
      margin-bottom: 4px;
      text-transform: lowercase;
    }
    .msg {
      background: #2a2a2a;
      padding: 10px 14px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      line-height: 1.4;
      color: #dfdfdf;
    }
    .msg-wrapper.self .msg {
      background: #2563eb; /* sleek blue */
      color: #fff;
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: 12px;
    }
    .sys {
      font-size: 11px;
      color: #555;
      align-self: center;
      text-transform: lowercase;
      margin: 8px 0;
    }
    #setup-form {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }
    #setup-form p {
      color: #777;
      text-transform: lowercase;
      text-align: center;
      margin-bottom: 10px;
    }
    #chat-form {
      display: none; /* hidden until joined */
      padding: 16px;
      border-top: 1px solid #2a2a2a;
      background: #181818;
      gap: 8px;
    }
    #chat-form.active {
      display: flex;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      background: #121212;
      border: 1px solid #333;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border 0.2s, background 0.2s;
    }
    input:focus {
      border-color: #444;
      background: #0a0a0a;
    }
    button {
      padding: 10px 20px;
      background: #2a2a2a;
      color: #aaa;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-transform: lowercase;
      transition: all 0.2s;
    }
    button:hover {
      background: #2563eb;
      color: #fff;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

  <div id="app">
    <header>
      <span>chat</span>
      <span id="status">disconnected</span>
    </header>
    
    <!-- Setup Screen -->
    <form id="setup-form">
      <p>enter a username to join</p>
      <input type="text" id="username-input" autocomplete="off" placeholder="username..." required autofocus>
      <button type="submit">join</button>
    </form>

    <!-- Chat Area -->
    <div id="messages" style="display:none;"></div>
    <form id="chat-form">
      <input type="text" id="msg-input" autocomplete="off" placeholder="type a message...">
      <button type="submit">send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    // DOM Elements
    const status = document.getElementById('status');
    const setupForm = document.getElementById('setup-form');
    const nameInput = document.getElementById('username-input');
    const chatForm = document.getElementById('chat-form');
    const msgInput = document.getElementById('msg-input');
    const messagesDiv = document.getElementById('messages');

    let username = '';

    // Helpers
    function appendSysMsg(text) {
      const div = document.createElement('div');
      div.className = 'sys';
      div.textContent = text;
      messagesDiv.appendChild(div);
      scrollToBottom();
    }

    function appendMessage(sender, text, isSelf = false) {
      const wrapper = document.createElement('div');
      wrapper.className = isSelf ? 'msg-wrapper self' : 'msg-wrapper';
      
      const senderDiv = document.createElement('div');
      senderDiv.className = 'sender';
      senderDiv.textContent = sender;

      const bubble = document.createElement('div');
      bubble.className = 'msg';
      bubble.textContent = text;

      if (!isSelf) wrapper.appendChild(senderDiv);
      wrapper.appendChild(bubble);
      messagesDiv.appendChild(wrapper);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Socket Events
    socket.on('connect', () => {
      status.textContent = 'connected';
      status.className = 'connected';
    });

    socket.on('disconnect', () => {
      status.textContent = 'disconnected';
      status.className = '';
      appendSysMsg('lost connection to server');
    });

    socket.on('user_joined', (user) => {
      appendSysMsg(`${user} joined the chat`);
    });

    socket.on('user_left', (user) => {
      appendSysMsg(`${user} left`);
    });

    socket.on('chat_message', (data) => {
      if (data.sender !== username) {
        appendMessage(data.sender, data.text, false);
      }
    });

    socket.on('history', (pastMessages) => {
      messagesDiv.innerHTML = ''; // clear
      pastMessages.forEach(m => {
        appendMessage(m.sender, m.text, m.sender === username);
      });
    });

    // Form Events
    setupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = nameInput.value.trim().toLowerCase(); // small letters constraint
      if (val) {
        username = val;
        socket.emit('join', username);
        
        // Show chat interface
        setupForm.style.display = 'none';
        messagesDiv.style.display = 'flex';
        chatForm.classList.add('active');
        msgInput.focus();
      }
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (text) {
        socket.emit('chat_message', text);
        appendMessage(username, text, true); // optimistic UI update
        msgInput.value = '';
      }
    });
  </script>
</body>
</html>
